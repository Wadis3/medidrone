<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <script type="text/javascript" src="https://d3js.org/d3.v3.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>  
  <meta charset="utf-8">
  <title>Drone in ukraine</title>

  <!-- ===== ENDAST NYTT: CSS-TEMA ===== -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      color: #222;
    }

    .topbar {
      background: #3d4ece;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title { color: #fff; font-size: 16px; font-weight: bold; }
    .topbar-links { display: flex; gap: 10px; }
    .topbar-links a {
      padding: 7px 14px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
    }
    .topbar-links a:hover { background: rgba(255,255,255,0.25); }

    .page-body {
      padding: 20px;
    }

    #text {
      margin: 12px 0 8px;
      font-size: 18px;
      font-weight: bold;
      color: #3d4ece;
    }

    #requests {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-top: 8px;
    }
    #requests tr:first-child td {
      background: #f0f2f5;
      font-weight: bold;
      color: #555;
      font-size: 12px;
    }
    #requests td {
      padding: 7px 14px;
      border-top: 1px solid #eee;
    }
  </style>
  <!-- ===== SLUT PÅ NYTT CSS ===== -->

  <script> <!-- OFÖRÄNDRAD ORIGINALKOD -->
    var field = L.icon({
      iconUrl: 'static/images/field.png',
      iconSize:     [40, 50],
      iconAnchor:   [17.5, 25],
      popupAnchor:  [0, -25]
    });
    
    var hospital = L.icon({
      iconUrl: 'static/images/hospital.png',
      iconSize:     [40, 50],
      iconAnchor:   [17.5, 25],
      popupAnchor:  [0, -25]
    });
    
    var drone = L.icon({
      iconUrl: 'static/images/drone.png',
      iconSize:     [40, 50],
      iconAnchor:   [17.5, 25],
      popupAnchor:  [0, -25]
    });

    var mediCar = L.icon({
      iconUrl: 'static/images/medicar.png',
      iconSize: [40, 50],
      iconAnchor: [17.5, 25],
      popupAnchor: [0, -25]
    });
  </script>
</head>

<body>
  <!-- ===== NYTT: topbar ersätter de gamla länkarna ===== -->
  <div class="topbar">
    <span class="topbar-title">
      <img src="/static/images/Medi_drone.png" alt="MediDrone" style="height: 36px; filter: brightness(0) invert(1); vertical-align: middle;">
      &nbsp; Hi {{ user }}
  </span>
      <div class="topbar-links">
      <a href="/login">Login</a>
      <a href="/addDronePage">Add a new drone</a>
      <a href="/booking">Book supplies</a>
    </div>
  </div>

  <div class="page-body">
    <!-- ===== OFÖRÄNDRAD ORIGINALKOD FRÅN HÄR ===== -->
    <div id="map" style="height: 720px; width: 1200px;"></div>

    <div id="text"></div>

    <table id="requests"></table>
    <!-- ===== SLUT PÅ ORIGINALKOD ===== -->
  </div>

  <script> <!-- OFÖRÄNDRAD -->
    var map = L.map('map').setView([50.130673, 36.224064], 9);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);
  
    var hospitalMarker = L.marker([49.97425, 36.1960665], {icon: hospital}).addTo(map);
    var droneMarkers = {};
    var carMarkers = {};
    var rangeCircles = {};
    var drone_count = 0;    
    var fieldMarkers = {};
    
    hospitalMarker.bindPopup("<b>Charkiv hospital</b>");

    loadField = function () {
      $.ajax({
        url: 'http://192.168.0.2:5000/get_field'
      })
      .done(function (server_response) {
        var all_field = Object.keys(server_response);
        for (const user of all_field) {
          var long = server_response[user].longitude;
          var lat = server_response[user].latitude;
          console.log(user);
          fieldMarkers[user] = L.marker([long, lat], {icon: field}).addTo(map);
          fieldMarkers[user].bindPopup("<b>"+user+"</b>");
        }
      });
    };
    loadField();

    function loadCar(car, long, lat){
      var doc = document.getElementById("map");
      $( doc ).ready(function() {
        if (car in carMarkers) {
          carMarkers[car].setLatLng(L.latLng(parseFloat(long), parseFloat(lat)));
          rangeCircles[car].setLatLng(L.latLng(parseFloat(long), parseFloat(lat)));
        } else {
          carMarkers[car] = L.marker([long, lat], {icon: mediCar}).addTo(map);
          rangeCircles[car] = L.circle([long, lat], {
            color: 'orange',
            fillColor: '#f50',
            fillOpacity: 0.2,
            radius: 100000
          }).addTo(map);
        }
        carMarkers[car].bindPopup(
              "<b>"+car + "<br>Longitude: "+ long +"%<br>Latitude: " + lat + "<b>"
        )
        console.log('bil bör synas')
      });
    };
    
    var circle = L.circle([49.97425, 36.1960665], {
      color: 'red',
      fillColor: '#f03',
      fillOpacity: 0.2,
      radius: 100000
    }).addTo(map);
  </script>

  <script type="text/javascript"> <!-- OFÖRÄNDRAD -->
    function LoadDrone(droneIP, long, lat, status, battery) {
      var doc = document.getElementById("map");
      $( doc ).ready(function() {
        if (droneIP in droneMarkers) {
          droneMarkers[droneIP].setLatLng(L.latLng(parseFloat(long), parseFloat(lat)));
        } else {
          droneMarkers[droneIP] = L.marker([long, lat], {icon: drone}).addTo(map);
        }
        droneMarkers[droneIP].bindPopup(
              "<b>IP: "+droneIP + "<br>Battery: "+ battery +"%<br>Status: " + status + "<b>"
            )
      })
    }
  </script> 

  <script> <!-- OFÖRÄNDRAD -->
    var set_delay = 50,
    callout = function () {
      $.ajax({
        url: 'http://192.168.0.2:5000/get_drones'
      })
      .done(function (server_response) {
        drone_count = 0;
        var available_drones = Object.keys(server_response);
        console.log(server_response)
        for (const droneIP of available_drones){
          var long = server_response[droneIP].longitude;
          var lat = server_response[droneIP].latitude;
          var status = server_response[droneIP].status;
          var battery = parseInt(server_response[droneIP].battery);
          if (status == "idle") {
            drone_count += 1;
          }
          LoadDrone(droneIP, long, lat, status, battery);
        }
        document.getElementById("text").innerHTML = "<h2>Available drones: " + drone_count + "</h2>";
      });
      
      $.ajax({
        url: 'http://192.168.0.2:5000/get_requests'
      })
      .done(function (server_response) {
          var table = document.getElementById("requests");
          table.innerHTML = "";
          var row = table.insertRow()
          row.insertCell(0).textContent = "user";
          row.insertCell(1).textContent = "longitude";
          row.insertCell(2).textContent = "latitude";
          for (const request of server_response) {
              var item = JSON.parse(request)
              var row = table.insertRow();
              row.insertCell(0).textContent = item.user;
              row.insertCell(1).textContent = item.longitude;
              row.insertCell(2).textContent = item.latitude;
          }
      });

      $.ajax({
        url: 'http://192.168.0.2:5000/get_cars'
      })
      .done(function (server_response) {
        var all_cars = Object.keys(server_response);
        for (const car of all_cars) {
          var long = server_response[car].longitude;
          var lat = server_response[car].latitude;
          loadCar(car, long, lat);
        }
      });
      
      setTimeout(callout, set_delay);
        
    };
    callout();
  </script>
</body>
</html>
