<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Preview – kartsidan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      padding: 20px;
      color: #222;
    }

    .topbar {
      background: #3d4ece;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 8px 8px 0 0;
    }
    .topbar-title { color: #fff; font-size: 16px; font-weight: bold; }
    .topbar-user { color: rgba(255,255,255,0.8); font-size: 13px; }
    .topbar-user a { color: rgba(255,255,255,0.65); text-decoration: none; margin-left: 12px; }
    .topbar-user a:hover { color: #fff; }

    .navbar {
      background: #fff;
      padding: 10px 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #eee;
    }
    .btn-primary {
      padding: 7px 14px;
      background: #3d4ece;
      color: #fff;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }
    .btn-primary:hover { background: #2f3aa8; }
    .btn-outline {
      padding: 7px 14px;
      background: #fff;
      color: #3d4ece;
      border: 1px solid #3d4ece;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }
    .btn-outline:hover { background: #eef0fc; }
    .btn-secondary {
      padding: 7px 14px;
      background: #fff;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
    }
    .btn-secondary:hover { background: #f5f5f5; }

    .main {
      background: #fff;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .map-placeholder {
      background: #e8ecf0;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #888;
      font-size: 14px;
      border-bottom: 1px solid #ddd;
    }
    .map-placeholder span:first-child { font-size: 40px; }
    .map-placeholder small { font-size: 12px; color: #aaa; }

    .bottom-panel {
      display: flex;
      gap: 16px;
      padding: 16px 20px;
    }

    .stat-card {
      flex: 0 0 auto;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stat-card .number { font-size: 32px; font-weight: bold; color: #3d4ece; }
    .stat-card .label { font-size: 13px; color: #555; line-height: 1.4; }

    .table-card {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }
    .table-card .table-header {
      padding: 8px 14px;
      background: #f8f8f8;
      border-bottom: 1px solid #eee;
      font-size: 12px;
      font-weight: bold;
      color: #555;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr { background: #f0f2f5; }
    th { padding: 7px 14px; text-align: left; color: #555; font-weight: bold; font-size: 12px; }
    td { padding: 7px 14px; color: #222; border-top: 1px solid #eee; }
    tr:nth-child(even) td { background: #fafafa; }

    .back { display: inline-block; padding: 14px 20px 0; color: #555; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div style="max-width: 900px; margin: 0 auto;">

    <div class="topbar">
      <span class="topbar-title">🛸 MediDrone</span>
      <span class="topbar-user">
        Inloggad som <strong style="color:#fff;">{{ user }}</strong>
        <a href="/login">Logga ut</a>
      </span>
    </div>

    <div class="navbar">
      <a href="/addDronePage" class="btn-primary">+ Lägg till drönare</a>
      <a href="/booking" class="btn-outline">Boka leverans</a>
      <a href="/addCarPage" class="btn-secondary">+ Lägg till bil</a>
    </div>

    <div class="main">

      <div class="map-placeholder">
        <span>🗺️</span>
        <span>Leaflet-karta renderas här</span>
        <small>OpenStreetMap · Kharkiv-området</small>
      </div>

      <div class="bottom-panel">

        <div class="stat-card">
          <div class="number" id="drone-count">3</div>
          <div class="label">Tillgängliga<br>drönare</div>
        </div>

        <div class="table-card">
          <div class="table-header">Aktiva förfrågningar</div>
          <table>
            <thead>
              <tr>
                <th>Användare</th>
                <th>Longitud</th>
                <th>Latitud</th>
              </tr>
            </thead>
            <tbody id="requests">
              <tr>
                <td>alpha</td><td>50.3618</td><td>35.9155</td>
              </tr>
              <tr>
                <td>bravo</td><td>50.2865</td><td>36.9419</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
