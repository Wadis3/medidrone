<!DOCTYPE html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Boka leverans</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; font-size: 22px; }
    .back { display: inline-block; margin-bottom: 16px; color: #555; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }

    fieldset {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 18px;
    }
    legend { font-weight: bold; padding: 0 8px; font-size: 14px; }

    label { display: block; font-size: 14px; margin-bottom: 4px; }
    input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }

    .radio-group { display: flex; gap: 16px; }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      cursor: pointer;
    }

    .item {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #fafafa;
    }
    .item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .item-header input[type="checkbox"] { width: 16px; height: 16px; }
    .item-header span { font-weight: 500; }

    .item-options {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #ccc;
    }
    .item.active .item-options { display: block; }
    .item.active { background: #fff; border-color: #c0392b; }

    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 13px; color: #555; }

    button.submit {
      width: 100%;
      padding: 14px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button.submit:hover { background: #a53225; }

    #summary {
      margin-top: 16px;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      display: none;
    }
  </style>
    <script type="text/javascript">
    function Submit() {
      console.log("hejsan")
      //var ip_address = document.getElementById("ip_address").value;
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
        try{
          var resp = this.responseText;
            alert(resp);
        }
        catch(err){
          alert(this.responseText);
        }
        }
      };
      xhttp.open("POST", "http://127.0.0.1:5004/planner", true);
      xhttp.setRequestHeader("Content-Type", "application/json");
      xhttp.send(JSON.stringify("test"));
      console.log("hej2");
    }
  </script>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; Tillbaka</a>
    <h1>Boka drönarleverans</h1>

    <form id="bookingForm">

      <fieldset>
        <legend>Avsändare</legend>
        <div class="radio-group">
          <label><input type="radio" name="senderType" value="hospital" checked> Sjukhus</label>
          <label><input type="radio" name="senderType" value="critical"> Kritisk plats</label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Koordinater</legend>
        <div class="row">
          <div>
            <label>Latitud</label>
            <input type="number" step="any" id="lat" placeholder="t.ex. 50.130673" required>
          </div>
          <div>
            <label>Longitud</label>
            <input type="number" step="any" id="lng" placeholder="t.ex. 36.224064" required>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Order</legend>
        //blod 

        <div class="item" data-item="blood">
          <label class="item-header">
            <input type="checkbox" data-toggle>
            <span>Blod</span>
          </label>
          <div class="item-options">
            <div class="field">
              <label>Blodtyp</label>
              <select>
                <option value="O-">O-</option>
                <option value="O+">O+</option>
                <option value="A-">A-</option>
                <option value="A+">A+</option>
                <option value="B-">B-</option>
                <option value="B+">B+</option>
                <option value="AB-">AB-</option>
                <option value="AB+">AB+</option>
              </select>
            </div>
            <div class="field">
              <label>Antal enheter</label>
              <input type="number" min="1" value="1">
            </div>
          </div>
        </div>

        <div class="item" data-item="plasma">
          <label class="item-header">
            <input type="checkbox" data-toggle>
            <span>Plasma</span>
          </label>
          <div class="item-options">
            <div class="field">
              <label>Antal enheter</label>
              <input type="number" min="1" value="1">
            </div>
          </div>
        </div>

        <div class="item" data-item="bandages">
          <label class="item-header">
            <input type="checkbox" data-toggle>
            <span>Förband / kompresser</span>
          </label>
          <div class="item-options">
            <div class="field">
              <label>Storlek</label>
              <select>
                <option value="S">Liten</option>
                <option value="M" selected>Medium</option>
                <option value="L">Stor</option>
              </select>
            </div>
            <div class="field">
              <label>Antal</label>
              <input type="number" min="1" value="5">
            </div>
          </div>
        </div>
    </form>
  </div>
</body>
