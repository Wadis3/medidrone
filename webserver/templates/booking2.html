<style>
  :root {
    --accent: #c0392b;
    --border: #ddd;
    --bg: #f5f5f5;
    --muted: #666;
  }

  * { box-sizing: border-box; }

  body {
    font: 14px system-ui, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 20px;
    color: #222;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    padding: 24px;
    border-radius: 8px;
  }

  h1 { margin: 0 0 16px; font-size: 22px; }
  .back { color: var(--muted); text-decoration: none; }

  fieldset {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
  }
  legend { font-weight: 600; padding: 0 6px; }

  label { display: block; margin-bottom: 4px; }
  input, select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font: inherit;
  }

  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }

  .radio-group { display: flex; gap: 16px; }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .item {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .item-header {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .item-options {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  .item.active { border-color: var(--accent); }
  .item.active .item-options { display: block; }

  .field + .field { margin-top: 10px; }

  button.submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button.submit:hover { filter: brightness(0.9); }
</style>
