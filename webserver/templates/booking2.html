<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Boka leverans</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; font-size: 22px; }
    .back { display: inline-block; margin-bottom: 16px; color: #555; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }

    fieldset {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 18px;
    }
    legend { font-weight: bold; padding: 0 8px; font-size: 14px; }

    label { display: block; font-size: 14px; margin-bottom: 4px; }
    input[type="number"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 13px; color: #555; }

    button.submit {
      width: 100%;
      padding: 14px;
      background: #3d4ece;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button.submit:hover { background: #2f3aa8; }

    #summary {
      margin-top: 16px;
      padding: 12px;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; Tillbaka</a>
    <h1>Boka dr&ouml;narleverans</h1>

    <form id="bookingForm">

      <fieldset>
        <legend>Blod</legend>
        <div class="field">
          <label for="bloodLiters">Antal liter</label>
          <input type="number" id="bloodLiters" min="1" value="1">
        </div>
        <div class="field">
          <label for="bloodType">Blodtyp</label>
          <select id="bloodType">
            <option value="O-">O-</option>
            <option value="O+">O+</option>
            <option value="A-">A-</option>
            <option value="A+">A+</option>
            <option value="B-">B-</option>
            <option value="B+">B+</option>
            <option value="AB-">AB-</option>
            <option value="AB+">AB+</option>
          </select>
        </div>
      </fieldset>

      <fieldset>
        <legend>Plasma</legend>
        <div class="field">
          <label for="plasmaLiters">Antal liter</label>
          <input type="number" id="plasmaLiters" min="1" value="1">
        </div>
      </fieldset>

      <fieldset>
        <legend>F&ouml;rband</legend>
        <div class="field">
          <label for="bandageSize">Storlek</label>
          <select id="bandageSize">
            <option value="S">Liten</option>
            <option value="M">Medium</option>
            <option value="L">Stor</option>
          </select>
        </div>
        <div class="field">
          <label for="bandageCount">Antal</label>
          <input type="number" id="bandageCount" min="1" value="5">
        </div>
      </fieldset>

      <button type="submit" class="submit">Skicka best&auml;llning</button>
    </form>

    <div id="summary"></div>
  </div>

  <script>
    var PLANNER_URL = "http://127.0.0.1:5004/planner";

    document.getElementById("bookingForm").addEventListener("submit", function (e) {
      e.preventDefault();
      sendBooking();
    });

    function collectOrder() {
      return {
        items: [
          {
            type: "blod",
            liter: Number(document.getElementById("bloodLiters").value),
            blodtyp: document.getElementById("bloodType").value
          },
          {
            type: "plasma",
            liter: Number(document.getElementById("plasmaLiters").value)
          },
          {
            type: "forband",
            storlek: document.getElementById("bandageSize").value,
            antal: Number(document.getElementById("bandageCount").value)
          }
        ]
      };
    }

    function sendBooking() {
      var order = collectOrder();
      var summary = document.getElementById("summary");
      summary.style.display = "block";
      summary.textContent = "Skickar best\u00e4llning...\n\n" + JSON.stringify(order, null, 2);

      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function () {
        if (this.readyState !== 4) return;
        if (this.status === 200) {
          summary.textContent =
            "Best\u00e4llning skickad.\n\nSvar fr\u00e5n route planner:\n" + this.responseText;
        } else {
          summary.textContent =
            "Kunde inte n\u00e5 route planner (status " + this.status + ").\n" +
            "Kontrollera att tj\u00e4nsten k\u00f6rs p\u00e5 port 5004.\n\n" +
            "Best\u00e4llning som skulle skickas:\n" + JSON.stringify(order, null, 2);
        }
      };
      xhttp.open("POST", PLANNER_URL, true);
      xhttp.setRequestHeader("Content-Type", "application/json");
      xhttp.send(JSON.stringify(order));
    }
  </script>
</body>
</html>
