<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <title>Boka leverans</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      padding: 28px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 { margin-top: 0; font-size: 22px; }
    .back { display: inline-block; margin-bottom: 16px; color: #555; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }

    fieldset {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 18px;
    }
    legend { font-weight: bold; padding: 0 8px; font-size: 14px; }

    label { display: block; font-size: 14px; margin-bottom: 4px; }
    input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }

    details {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #fafafa;
    }
    details[open] {
      background: #fff;
      border-color: #c0392b;
    }
    summary {
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before {
      content: '▶';
      font-size: 10px;
      color: #999;
      transition: transform 0.15s;
    }
    details[open] summary::before {
      transform: rotate(90deg);
    }

    .item-options {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #ccc;
    }
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 13px; color: #555; }

    button.submit {
      width: 100%;
      padding: 14px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button.submit:hover { background: #a53225; }

    #summary-box {
      margin-top: 16px;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; Tillbaka</a>
    <h1>Boka drönarleverans</h1>

    <form id="bookingForm">

      <fieldset>
        <legend>Order</legend>

        <details>
          <summary>Blod</summary>
          <div class="item-options">
            <div class="field">
              <label>Blodtyp</label>
              <select name="blood_type">
                <option value="O-">O-</option>
                <option value="O+">O+</option>
                <option value="A-">A-</option>
                <option value="A+">A+</option>
                <option value="B-">B-</option>
                <option value="B+">B+</option>
                <option value="AB-">AB-</option>
                <option value="AB+">AB+</option>
              </select>
            </div>
            <div class="field">
              <label>Antal enheter</label>
              <input type="number" name="blood_units" min="1" value="1">
            </div>
          </div>
        </details>

        <details>
          <summary>Plasma</summary>
          <div class="item-options">
            <div class="field">
              <label>Antal enheter</label>
              <input type="number" name="plasma_units" min="1" value="1">
            </div>
          </div>
        </details>

        <details>
          <summary>Förband / kompresser</summary>
          <div class="item-options">
            <div class="field">
              <label>Storlek</label>
              <select name="bandage_size">
                <option value="S">Liten</option>
                <option value="M" selected>Medium</option>
                <option value="L">Stor</option>
              </select>
            </div>
            <div class="field">
              <label>Antal</label>
              <input type="number" name="bandage_qty" min="1" value="5">
            </div>
          </div>
        </details>

      </fieldset>

      <button type="button" class="submit" onclick="submitForm()">Boka leverans</button>
    </form>

    <div id="summary-box"></div>
  </div>

  <script>
    function submitForm() {
      const form = document.getElementById('bookingForm');
      const data = {};

      const blood = form.querySelector('details:nth-of-type(1)');
      if (blood.open) {
        data.blood = {
          type: form.blood_type.value,
          units: form.blood_units.value
        };
      }

      const plasma = form.querySelector('details:nth-of-type(2)');
      if (plasma.open) {
        data.plasma = {
          units: form.plasma_units.value
        };
      }

      const bandages = form.querySelector('details:nth-of-type(3)');
      if (bandages.open) {
        data.bandages = {
          size: form.bandage_size.value,
          qty: form.bandage_qty.value
        };
      }

      const box = document.getElementById('summary-box');
      box.style.display = 'block';
      box.textContent = JSON.stringify(data, null, 2);

      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          alert(this.responseText);
        }
      };
      xhttp.open("POST", "http://127.0.0.1:5004/planner", true);
      xhttp.setRequestHeader("Content-Type", "application/json");
      xhttp.send(JSON.stringify(data));
    }
  </script>
</body>
</html>
